<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syue & Lynn 旅遊足跡</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: #1a1a1a; background: #ffffff; line-height: 1.7;
    }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; border-bottom: 1px solid #e8e8e8;
      position: sticky; top: 0; background: #fff; z-index: 100;
    }
    .nav-logo { font-size: 18px; font-weight: 600; }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { font-size: 14px; color: #666; text-decoration: none; }
    .nav-links a:hover { color: #1a1a1a; }
    .hero {
      padding: 5rem 2rem 4rem; text-align: center; border-bottom: 1px solid #e8e8e8;
    }
    .hero h1 { font-size: 36px; font-weight: 600; margin-bottom: 1rem; }
    .hero p { font-size: 16px; color: #666; }
    .section { padding: 4rem 2rem; max-width: 960px; margin: 0 auto; }
    .section-label {
      display: inline-block; font-size: 12px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; color: #888;
      background: #f4f4f4; padding: 4px 12px; border-radius: 20px; margin-bottom: 0.75rem;
    }
    .section h2 { font-size: 26px; font-weight: 600; margin-bottom: 2rem; }
    hr.divider { border: none; border-top: 1px solid #e8e8e8; }
    .card {
      background: #fff; border: 1px solid #e8e8e8;
      border-radius: 12px; overflow: hidden; margin-bottom: 2rem;
    }
    .card-img { width: 100%; height: 220px; object-fit: cover; display: block; }
    .card-img-placeholder {
      width: 100%; height: 220px; background: #f4f4f4;
      display: flex; align-items: center; justify-content: center; font-size: 14px; color: #aaa;
    }
    .card-body { padding: 1.5rem; }
    .card-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .card-meta { font-size: 13px; color: #888; margin-bottom: 1rem; }
    .badge {
      display: inline-block; font-size: 12px; padding: 3px 10px;
      border-radius: 20px; margin-right: 6px; margin-bottom: 8px;
    }
    .badge-green { background: #e6f4ea; color: #2d7a3a; }
    .badge-blue  { background: #e8f0fe; color: #1a56a0; }
    .card-desc { font-size: 15px; color: #444; margin-top: 0.75rem; margin-bottom: 1.5rem; }
    .kuula-wrap { border-radius: 8px; overflow: hidden; margin-bottom: 0.5rem; }
    .kuula-wrap iframe { display: block; border: none; }
    .kuula-caption { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 0.5rem; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
    .empty-msg {
      font-size: 14px; color: #aaa; padding: 2rem; text-align: center;
      border: 1px dashed #e8e8e8; border-radius: 12px;
    }
    footer {
      padding: 2.5rem; text-align: center; font-size: 13px;
      color: #aaa; border-top: 1px solid #e8e8e8;
    }
    @media (max-width: 600px) {
      .hero h1 { font-size: 26px; }
      nav { padding: 1rem; }
      .nav-links { gap: 1rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">Syue & Lynn 旅遊足跡</div>
    <div class="nav-links">
      <a href="#moto">重機地點</a>
      <a href="#camping">露營地點</a>
    </div>
  </nav>

  <div class="hero">
    <h1>Syue & Lynn 旅遊足跡</h1>
    <p>記錄我們騎過的山路、住過的營地<br>每一個地點都是一段故事</p>
  </div>

  <div class="section" id="moto">
    <div class="section-label">重機地點</div>
    <h2>騎過的路</h2>
    <div class="card-grid" id="moto-container"></div>
  </div>

  <hr class="divider">

  <div class="section" id="camping">
    <div class="section-label">露營地點</div>
    <h2>住過的營地</h2>
    <div id="camping-container"></div>
  </div>

  <footer>
    © Syue & Lynn · 用 Osmo 360 記錄每一個足跡
  </footer>

  <script>
    function getData(type) {
      return JSON.parse(localStorage.getItem('sl_' + type) || '[]');
    }

    function extractKuulaUrl(code) {
      const match = code.match(/data-kuula="([^"]+)"/);
      return match ? match[1] : null;
    }

    function renderCamping() {
      const list = getData('camping');
      const el = document.getElementById('camping-container');
      if (list.length === 0) {
        el.innerHTML = '<div class="empty-msg">還沒有露營地點，到後台新增吧！</div>';
        return;
      }
      el.innerHTML = list.map(p => {
        const kuulaUrl = p.kuula ? extractKuulaUrl(p.kuula) : null;
        return `
          <div class="card">
            ${p.img
              ? `<img class="card-img" src="${p.img}" alt="${p.name}">`
              : '<div class="card-img-placeholder">📷 封面照片</div>'}
            <div class="card-body">
              <div class="card-title">${p.name}</div>
              <div class="card-meta">${p.location || ''}${p.date ? ' · ' + p.date : ''}</div>
              ${p.tags ? p.tags.split(',').map(t => `<span class="badge badge-green">${t.trim()}</span>`).join('') : ''}
              ${p.desc ? `<p class="card-desc">${p.desc}</p>` : ''}
              ${kuulaUrl ? `
                <div class="kuula-wrap">
                  <iframe src="${kuulaUrl}" width="100%" height="500" allowfullscreen allow="vr"></iframe>
                </div>
                <p class="kuula-caption">360° 環景 — 拖動滑鼠探索現場環境</p>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderMoto() {
      const list = getData('moto');
      const el = document.getElementById('moto-container');
      if (list.length === 0) {
        el.innerHTML = '<div class="empty-msg" style="grid-column:1/-1">還沒有重機地點，到後台新增吧！</div>';
        return;
      }
      el.innerHTML = list.map(p => `
        <div class="card">
          ${p.img
            ? `<img class="card-img" src="${p.img}" alt="${p.name}">`
            : '<div class="card-img-placeholder">🏍 封面照片</div>'}
          <div class="card-body">
            <div class="card-title">${p.name}</div>
            <div class="card-meta">${p.location || ''}${p.date ? ' · ' + p.date : ''}</div>
            ${p.tags ? p.tags.split(',').map(t => `<span class="badge badge-blue">${t.trim()}</span>`).join('') : ''}
            ${p.desc ? `<p class="card-desc">${p.desc}</p>` : ''}
          </div>
        </div>
      `).join('');
    }

    renderCamping();
    renderMoto();
  </script>
</body>
</html>
