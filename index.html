<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syue & Lynn 旅遊足跡</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Noto+Serif+TC:wght@400;500&display=swap" rel="stylesheet">
  <!-- Three.js 改為點擊 360° 才動態載入，加快首頁速度 -->
  <style>
    :root{--bg:#0f1410;--surface:#1a1f1b;--surface2:#222820;--border:#2e352c;--text:#e8e4dc;--muted:#8a9088;--accent:#7eb87a;--accent2:#c4a35a;--radius:12px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Noto Serif TC',serif;background:var(--bg);color:var(--text);line-height:1.8;}
    nav{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2.5rem;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(15,20,16,0.92);backdrop-filter:blur(12px);}
    .nav-logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--accent2);}
    .nav-links{display:flex;gap:2rem;}
    .nav-links a{font-size:13px;color:var(--muted);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;}
    .nav-links a:hover{color:var(--text);}
    .hero{padding:6rem 2.5rem 5rem;text-align:center;border-bottom:1px solid var(--border);}
    .hero-eyebrow{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:1.25rem;}
    .hero h1{font-family:'Playfair Display',serif;font-size:52px;font-weight:700;line-height:1.2;margin-bottom:1.25rem;}
    .hero p{font-size:16px;color:var(--muted);}
    .social-section{padding:2rem 2.5rem;max-width:960px;margin:0 auto;border-bottom:1px solid var(--border);}
    .social-title{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}
    .social-links{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start;}
    .social-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--muted);text-decoration:none;background:var(--surface);transition:all 0.15s;}
    .social-btn:hover{border-color:var(--accent);color:var(--text);}
    .social-btn.fb:hover{border-color:#1877f2;color:#1877f2;}
    .social-btn.ig:hover{border-color:#e1306c;color:#e1306c;}
    .social-btn.line:hover{border-color:#00c300;color:#00c300;}
    .qr-block{display:inline-block;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
    .qr-block img{width:110px;height:110px;border-radius:6px;display:block;}
    .qr-label{font-size:11px;color:var(--muted);text-align:center;margin-top:6px;}
    .section{padding:4rem 2.5rem;max-width:960px;margin:0 auto;}
    .section-header{display:flex;align-items:baseline;gap:1rem;margin-bottom:2rem;}
    .section-eyebrow{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);white-space:nowrap;}
    .section h2{font-family:'Playfair Display',serif;font-size:32px;font-weight:500;}
    .section-line{flex:1;height:1px;background:var(--border);margin-left:1rem;}
    hr.divider{border:none;border-top:1px solid var(--border);}
    .search-wrap{position:relative;margin-bottom:1rem;}
    .search-wrap input{width:100%;padding:10px 40px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--text);font-family:inherit;outline:none;}
    .search-wrap input:focus{border-color:var(--accent);}
    .search-wrap input::placeholder{color:var(--muted);}
    .s-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);pointer-events:none;}
    .s-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;display:none;}
    .s-clear.show{display:block;}
    .filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:1.75rem;flex-wrap:wrap;}
    .filter-tag{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:inherit;}
    .filter-tag:hover{border-color:var(--accent);color:var(--accent);}
    .filter-tag.active{background:var(--accent);color:#0f1410;border-color:var(--accent);font-weight:500;}
    .filter-tag.gold:hover{border-color:var(--accent2);color:var(--accent2);}
    .filter-tag.gold.active{background:var(--accent2);border-color:var(--accent2);}
    .filter-select{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;outline:none;font-family:inherit;}
    .filter-count{font-size:12px;color:var(--muted);margin-left:auto;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:2rem;}
    .card:hover{border-color:#3e4a3c;}
    .card-img{width:100%;height:260px;object-fit:cover;display:block;}
    @media(max-width:768px){.card-img{height:auto;aspect-ratio:16/9;}}
    .card-body{padding:1.75rem;}
    .card-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:500;margin-bottom:6px;}
    .card-meta{font-size:12px;color:var(--muted);margin-bottom:0.75rem;}
    .card-tags{display:block;margin-bottom:0.75rem;line-height:2;}
    .badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;margin-right:6px;margin-bottom:4px;}
    .badge-green{background:rgba(126,184,122,0.12);color:var(--accent);border:1px solid rgba(126,184,122,0.25);}
    .badge-gold{background:rgba(196,163,90,0.12);color:var(--accent2);border:1px solid rgba(196,163,90,0.25);}
    .btn-more{display:block;width:fit-content;margin-top:0.5rem;padding:6px 16px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;letter-spacing:0.05em;}
    .btn-more:hover{border-color:var(--accent);color:var(--accent);}
    .card-full{display:none;margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border);}
    .card-full.open{display:block;}
    .desc-block{margin-bottom:1.1rem;}
    .desc-title{font-size:13px;font-weight:600;letter-spacing:0.05em;margin-bottom:0.4rem;}
    .desc-text{font-size:14px;color:var(--muted);line-height:1.8;}
    /* Inline 360° viewer */
    .pano-wrap{position:relative;width:100%;border-radius:8px;overflow:hidden;background:#0a0f0a;margin-top:1.25rem;user-select:none;}
    .pano-wrap canvas{display:block;width:100% !important;height:100% !important;cursor:grab;touch-action:none;}
    .pano-wrap canvas.grabbing{cursor:grabbing;}
    .pano-btn-bar{position:absolute;top:8px;right:8px;display:flex;gap:6px;z-index:10;}
    .pano-btn{width:32px;height:32px;border-radius:8px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:background .15s;}
    .pano-btn:hover{background:rgba(255,255,255,.2);}
    .pano-wrap:-webkit-full-screen{width:100vw;height:100vh;}
    .pano-wrap:fullscreen{width:100vw !important;height:100vh !important;}
    .pano-wrap:fullscreen canvas{height:100% !important;}
    .pano-ring{width:36px;height:36px;border:3px solid rgba(126,184,122,.15);border-top-color:#7eb87a;border-radius:50%;animation:spin .9s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .pano-loading-text{font-size:12px;color:#8a9088;}
    .pano-progress-bar{position:absolute;bottom:0;left:0;height:3px;background:#7eb87a;width:0%;transition:width .2s ease;border-radius:0 2px 2px 0;z-index:12;}
    .pano-progress-pct{font-size:11px;color:#7eb87a;margin-top:4px;}
    .pano-placeholder{width:100%;height:340px;background:var(--surface2);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:background .15s;margin-top:1.25rem;}
    .pano-placeholder:hover{background:rgba(126,184,122,.08);}
    .pano-placeholder-icon{font-size:38px;}
    .pano-placeholder-text{font-size:13px;color:var(--muted);}
    .pano-placeholder-btn{padding:8px 22px;background:rgba(126,184,122,.12);border:1px solid rgba(126,184,122,.3);border-radius:20px;color:var(--accent);font-size:13px;cursor:pointer;font-family:inherit;}
    .pano-label{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.8);font-size:11px;background:rgba(0,0,0,.5);padding:4px 14px;border-radius:14px;pointer-events:none;white-space:nowrap;}
    .pano-dots{position:absolute;bottom:10px;right:10px;display:flex;flex-direction:column;gap:6px;}
    .pano-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);cursor:pointer;transition:all .2s;}
    .pano-dot.active{background:#7eb87a;border-color:#7eb87a;}
    .pano-hs-layer{position:absolute;inset:0;pointer-events:none;}
    .pano-hs{position:absolute;transform:translate(-50%,-50%);cursor:pointer;pointer-events:auto;transition:transform .15s;}
    .pano-hs:hover{transform:translate(-50%,-50%) scale(1.2);}
    .pano-hs-inner{border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 2px 10px rgba(0,0,0,.5);}
    .pano-hs-label{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);white-space:nowrap;background:rgba(0,0,0,.75);color:#fff;font-size:11px;padding:3px 9px;border-radius:10px;opacity:0;transition:opacity .2s;pointer-events:none;}
    .pano-hs:hover .pano-hs-label{opacity:1;}
    .pano-hs-pulse{position:absolute;inset:0;border-radius:50%;animation:pr 1.9s ease-out infinite;}
    @keyframes pr{0%{transform:scale(1);opacity:.65;}100%{transform:scale(2.3);opacity:0;}}
    .yt-wrap{border-radius:8px;overflow:hidden;margin-top:1.25rem;margin-bottom:0.25rem;position:relative;padding-bottom:56.25%;height:0;}
    .yt-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:block;}
    .yt-caption{font-size:11px;color:var(--muted);text-align:center;letter-spacing:0.08em;margin-bottom:0.5rem;}
    .ig-link{display:inline-flex;align-items:center;gap:8px;margin-top:1rem;padding:9px 18px;border:1px solid rgba(225,48,108,0.3);border-radius:var(--radius);font-size:13px;color:#e1306c;text-decoration:none;background:rgba(225,48,108,0.06);transition:all 0.15s;}
    .ig-link:hover{background:rgba(225,48,108,0.12);border-color:#e1306c;}
    .card-expand-img{width:100%;max-height:320px;object-fit:cover;border-radius:8px;margin-bottom:1rem;display:block;}
    .card-expand-placeholder{width:100%;height:180px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);margin-bottom:1rem;}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;}
    .hl{background:rgba(126,184,122,0.3);border-radius:2px;padding:0 2px;}
    .hl.gold{background:rgba(196,163,90,0.3);}
    .empty-msg{font-size:14px;color:var(--muted);padding:3rem;text-align:center;border:1px dashed var(--border);border-radius:var(--radius);}
    .loading{text-align:center;padding:3rem;font-size:13px;color:var(--muted);}
    footer{padding:3rem 2.5rem;text-align:center;font-size:12px;color:var(--muted);border-top:1px solid var(--border);}

    @media(max-width:600px){.hero h1{font-size:34px;}nav{padding:1rem 1.25rem;}.section{padding:3rem 1.25rem;}.social-section{padding:1.5rem 1.25rem;}}
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">Syue &amp; Lynn</div>
    <div class="nav-links"><a href="#moto">重機</a><a href="#camping">露營</a><a href="#domestic">國內旅遊</a><a href="#overseas">國外旅遊</a></div>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">Travel Journal</div>
    <h1>旅遊足跡</h1>
    <p>記錄我們騎過的山路、住過的營地、走過的城市<br>每一個地點都是一段故事</p>
  </div>

  <div class="social-section" id="social-section" style="display:none;">
    <div class="social-title">Follow Us</div>
    <div class="social-links" id="social-links"></div>
  </div>

  <div class="section" id="moto">
    <div class="section-header">
      <span class="section-eyebrow">Motorcycle</span>
      <h2>重機地點</h2>
      <div class="section-line"></div>
    </div>
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input type="text" id="moto-search" placeholder="搜尋重機地點..." oninput="onSearch('moto')">
      <button class="s-clear" id="moto-clear" onclick="clearSearch('moto')">×</button>
    </div>
    <div class="filter-bar" id="moto-filter-bar"><span style="font-size:13px;color:var(--muted)">載入中...</span></div>
    <div class="card-grid" id="moto-container"><div class="loading" style="grid-column:1/-1">載入中...</div></div>
  </div>

  <hr class="divider">

  <div class="section" id="camping">
    <div class="section-header">
      <span class="section-eyebrow">Camping</span>
      <h2>露營地點</h2>
      <div class="section-line"></div>
    </div>
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input type="text" id="camp-search" placeholder="搜尋露營地點..." oninput="onSearch('camping')">
      <button class="s-clear" id="camp-clear" onclick="clearSearch('camping')">×</button>
    </div>
    <div class="filter-bar" id="camp-filter-bar"><span style="font-size:13px;color:var(--muted)">載入中...</span></div>
    <div class="card-grid" id="camping-container"><div class="loading" style="grid-column:1/-1">載入中...</div></div>
  </div>

  <hr class="divider">

  <div class="section" id="domestic">
    <div class="section-header">
      <span class="section-eyebrow">Domestic</span>
      <h2>國內旅遊</h2>
      <div class="section-line"></div>
    </div>
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input type="text" id="domestic-search" placeholder="搜尋國內旅遊地點..." oninput="onSearch('domestic')">
      <button class="s-clear" id="domestic-clear" onclick="clearSearch('domestic')">×</button>
    </div>
    <div class="filter-bar" id="domestic-filter-bar"><span style="font-size:13px;color:var(--muted)">載入中...</span></div>
    <div class="card-grid" id="domestic-container"><div class="loading" style="grid-column:1/-1">載入中...</div></div>
  </div>

  <hr class="divider">

  <div class="section" id="overseas">
    <div class="section-header">
      <span class="section-eyebrow">Overseas</span>
      <h2>國外旅遊</h2>
      <div class="section-line"></div>
    </div>
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input type="text" id="overseas-search" placeholder="搜尋國外旅遊地點..." oninput="onSearch('overseas')">
      <button class="s-clear" id="overseas-clear" onclick="clearSearch('overseas')">×</button>
    </div>
    <div class="filter-bar" id="overseas-filter-bar"><span style="font-size:13px;color:var(--muted)">載入中...</span></div>
    <div class="card-grid" id="overseas-container"><div class="loading" style="grid-column:1/-1">載入中...</div></div>
  </div>

  <footer>© SYUE &amp; LYNN · 用 Osmo 360 記錄每一個足跡</footer>

  <script>
    const API='https://script.google.com/macros/s/AKfycbzPguC2eh8JP1x1GAOaqodo9r4nb1BPEE4JayJoQxBF-31jZTLl02pIj1ADQ8SGyHxcDw/exec';
    let campingData=[],motoData=[],domesticData=[],overseasData=[];
    const state={camping:{tag:'全部',loc:'全部',kw:''},moto:{tag:'全部',loc:'全部',kw:''},domestic:{tag:'全部',loc:'全部',kw:''},overseas:{tag:'全部',loc:'全部',kw:''}};
    let cid=0;

    // ── 動態載入 Three.js（只在使用者點擊 360° 時才下載）──
    var _threeLoaded = false, _threeCallbacks = [];
    function loadThreeJS(cb) {
      if (window.THREE) { cb(); return; }
      _threeCallbacks.push(cb);
      if (_threeLoaded) return; // 已在載入中
      _threeLoaded = true;
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
      s.onload = function() { _threeCallbacks.forEach(function(f){f();}); _threeCallbacks=[]; };
      document.head.appendChild(s);
    }

    // ── 分頁設定 ─────────────────────────────────────────────
    const PAGE_SIZE = 6; // 首頁每次顯示幾筆
    var pageState = { camping: PAGE_SIZE, moto: PAGE_SIZE, domestic: PAGE_SIZE, overseas: PAGE_SIZE };

    // ── 360° inline viewer ─────────────────────────────────
    var _panoViewers = {}; // id → InlinePano instance

    function InlinePano(containerId, cfg, gold) {
      var me = this;
      me.containerId = containerId;
      me.cfg = cfg; // {scenes:[{name,imageUrl,hotspots:[]}], startScene}
      me.gold = gold;
      me.currentIdx = 0;
      me.renderer = null; me.camera = null; me.scene = null;
      me.sphere = null; me.mat = null;
      me.isDrag = false; me.prevX = 0; me.prevY = 0;
      me.velX = 0; me.velY = 0; me.fov = 75;
      me.loader = null; me.raf = null;
      me.init();
    }

    InlinePano.prototype.init = function() {
      var me = this;
      var wrap = document.getElementById(me.containerId);
      if (!wrap) return;

      // Canvas
      var canvas = document.createElement('canvas');
      var _isMob = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      var _cvH = _isMob ? 240 : 340;
      canvas.style.cssText = 'width:100%;height:'+_cvH+'px;display:block;';
      wrap.innerHTML = '<div class="pano-loading"><div class="pano-ring"></div><div class="pano-loading-text">載入中...</div><div class="pano-progress-pct" id="pct-'+me.containerId+'"></div></div><div class="pano-progress-bar" id="bar-'+me.containerId+'"></div>';
      wrap.appendChild(canvas);
      var loadEl = wrap.querySelector('.pano-loading');

      // Btn bar (fullscreen)
      var btnBar = document.createElement('div');
      btnBar.className = 'pano-btn-bar';
      var fsBtn = document.createElement('button');
      fsBtn.className = 'pano-btn';
      fsBtn.textContent = '⛶';
      fsBtn.title = '全螢幕';
      var _inPseudoFs = false, _origWrapStyle = '';
      fsBtn.addEventListener('click', function() {
        var isMob = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMob || !wrap.requestFullscreen) {
          // iOS pseudo-fullscreen
          if (!_inPseudoFs) {
            _origWrapStyle = wrap.getAttribute('style') || '';
            wrap.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;border-radius:0;background:#0a0f0a;';
            fsBtn.textContent = '✕';
            _inPseudoFs = true;
            setTimeout(function() { me.resize(); }, 60);
          } else {
            if (_origWrapStyle) wrap.setAttribute('style', _origWrapStyle);
            else wrap.removeAttribute('style');
            fsBtn.textContent = '⛶';
            _inPseudoFs = false;
            setTimeout(function() { me.resize(); }, 60);
          }
        } else {
          if (!document.fullscreenElement) {
            wrap.requestFullscreen();
            fsBtn.textContent = '✕';
          } else {
            document.exitFullscreen();
            fsBtn.textContent = '⛶';
          }
        }
      });
      document.addEventListener('fullscreenchange', function() {
        var inFs = document.fullscreenElement === wrap;
        fsBtn.textContent = inFs ? '✕' : '⛶';
        setTimeout(function() { me.resize(); }, 50);
        if (inFs) setTimeout(function() { me.resize(); }, 300);
      });
      btnBar.appendChild(fsBtn);
      wrap.appendChild(btnBar);

      // HS layer
      var hsLayer = document.createElement('div');
      hsLayer.className = 'pano-hs-layer';
      wrap.appendChild(hsLayer);
      me.hsLayer = hsLayer;

      // Label
      var label = document.createElement('div');
      label.className = 'pano-label';
      wrap.appendChild(label);
      me.labelEl = label;

      // Dots
      var dots = document.createElement('div');
      dots.className = 'pano-dots';
      wrap.appendChild(dots);
      me.dotsEl = dots;

      // Three.js init — 行動裝置使用低功耗設定避免閃退
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      try {
        me.renderer = new THREE.WebGLRenderer({
          canvas: canvas,
          antialias: !isMobile,
          powerPreference: isMobile ? 'low-power' : 'default',
          preserveDrawingBuffer: true  // 需要 true 才能截圖做交互淡化
        });
        me.renderer.setPixelRatio(isMobile ? 1 : Math.min(window.devicePixelRatio, 2)); // 手機固定1倍，省記憶體
        me.camera = new THREE.PerspectiveCamera(75, 1, 0.1, 200);
        me.camera.rotation.order = 'YXZ';
        me.scene = new THREE.Scene();
        var segments = isMobile ? 32 : 56; // 手機降低球體精細度
        var geo = new THREE.SphereGeometry(100, segments, segments * 2 / 3);
        me.mat = new THREE.MeshBasicMaterial({ side: THREE.BackSide, color: 0x111811 });
        me.sphere = new THREE.Mesh(geo, me.mat);
        me.scene.add(me.sphere);
        me.loader = new THREE.TextureLoader();
        me.loader.crossOrigin = 'anonymous';
        // Handle context loss on mobile
        canvas.addEventListener('webglcontextlost', function(e) {
          e.preventDefault();
          cancelAnimationFrame(me.raf);
          me.raf = null;
        });
        canvas.addEventListener('webglcontextrestored', function() {
          me.goScene(me.currentIdx);
          loop();
        });
      } catch(e) {
        wrap.innerHTML = '<div style="padding:2rem;text-align:center;color:#8a9088;font-size:13px;">⚠️ WebGL 不支援</div>';
        return;
      }

      // Resize — 正確處理全螢幕
      me.resize = function() {
        var inFs = document.fullscreenElement === wrap;
        var w = inFs ? window.innerWidth : wrap.clientWidth;
        var h = inFs ? window.innerHeight : (_cvH || 340);
        canvas.style.height = h + 'px';
        me.renderer.setSize(w, h, false);
        me.camera.aspect = w / h;
        me.camera.updateProjectionMatrix();
      };
      me.resize();

      // Controls
      canvas.addEventListener('mousedown', function(e) {
        me.isDrag = true; me.prevX = e.clientX; me.prevY = e.clientY;
        canvas.classList.add('grabbing');
      });
      window.addEventListener('mouseup', function() { me.isDrag = false; canvas.classList.remove('grabbing'); });
      window.addEventListener('mousemove', function(e) {
        if (!me.isDrag) return;
        var dx = e.clientX - me.prevX, dy = e.clientY - me.prevY;
        me.velX = dx; me.velY = dy;
        me.camera.rotation.y += dx * 0.005;
        me.camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, me.camera.rotation.x + dy * 0.005));
        me.prevX = e.clientX; me.prevY = e.clientY;
      });
      canvas.addEventListener('wheel', function(e) {
        me.fov = Math.max(40, Math.min(100, me.fov + e.deltaY * 0.04));
        me.camera.fov = me.fov; me.camera.updateProjectionMatrix();
      });
      var ltouch = null, lpinch = null;
      canvas.addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (e.touches.length === 1) { ltouch = { x: e.touches[0].clientX, y: e.touches[0].clientY }; lpinch = null; }
        else { lpinch = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); }
      }, { passive: false });
      canvas.addEventListener('touchmove', function(e) {
        e.preventDefault();
        if (e.touches.length === 1 && ltouch) {
          var dx = e.touches[0].clientX - ltouch.x, dy = e.touches[0].clientY - ltouch.y;
          me.camera.rotation.y += dx * 0.006;
          me.camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, me.camera.rotation.x + dy * 0.006));
          ltouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        } else if (e.touches.length === 2 && lpinch) {
          var d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
          me.fov = Math.max(40, Math.min(100, me.fov * (lpinch / d)));
          me.camera.fov = me.fov; me.camera.updateProjectionMatrix(); lpinch = d;
        }
      }, { passive: false });

      // Render loop — 不在畫面內時自動暫停（避免 iOS 多 WebGL context 崩潰）
      me._isVisible = false;
      me.raycaster = new THREE.Raycaster();
      var observer = new IntersectionObserver(function(entries) {
        me._isVisible = entries[0].isIntersecting;
        if (me._isVisible && !me.raf) loop();
      }, { threshold: 0.1 });
      observer.observe(wrap);

      function loop() {
        if (!me._isVisible) { me.raf = null; return; } // 不在畫面內就停止
        me.raf = requestAnimationFrame(loop);
        if (!me.isDrag) {
          me.velX *= 0.9; me.velY *= 0.9;
          if (Math.abs(me.velX) > 0.01) me.camera.rotation.y += me.velX * 0.0006;
          if (Math.abs(me.velY) > 0.01) me.camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, me.camera.rotation.x + me.velY * 0.0006));
        }
        me.renderer.render(me.scene, me.camera);
        me.updateHs();
      }
      loop();

      // Load first scene
      me.buildDots();
      me.goScene(0, loadEl);
    };

    InlinePano.prototype.goScene = function(idx, loadEl, onReady) {
      var me = this;
      var scenes = me.cfg.scenes || [];
      if (!scenes.length) return;
      idx = Math.max(0, Math.min(scenes.length - 1, idx));
      me.currentIdx = idx;
      var sc = scenes[idx];
      me.labelEl.textContent = sc.name || '';
      me.camera.rotation.set(0, 0, 0); me.fov = 75; me.camera.fov = 75; me.camera.updateProjectionMatrix();
      me.buildDots();
      me.buildHs(sc.hotspots || []);

      if (!sc.imageUrl) return;
      var wrap = document.getElementById(me.containerId);
      var ld = wrap && wrap.querySelector('.pano-loading');
      var bar = document.getElementById('bar-' + me.containerId);
      var pct = document.getElementById('pct-' + me.containerId);
      if (ld) { ld.style.display = 'flex'; ld.querySelector('.pano-loading-text').textContent = '下載圖片中...'; }
      if (bar) bar.style.width = '0%';

      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      var maxPx = isMobile ? 1024 : 4096; // 手機最大貼圖 1024，大幅降低記憶體使用

      // XHR 下載以取得進度百分比
      var xhr = new XMLHttpRequest();
      xhr.open('GET', sc.imageUrl, true);
      xhr.responseType = 'blob';
      xhr.onprogress = function(e) {
        if (e.lengthComputable) {
          var p = Math.round(e.loaded / e.total * 90);
          if (bar) bar.style.width = p + '%';
          if (pct) pct.textContent = p + '%';
          var ltxt = ld && ld.querySelector('.pano-loading-text');
          if (ltxt) ltxt.textContent = '下載中 ' + p + '%';
        }
      };
      xhr.onload = function() {
        if (bar) bar.style.width = '95%';
        var blobUrl = URL.createObjectURL(xhr.response);
        var img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function() {
          try {
            var w = img.naturalWidth, h = img.naturalHeight;
            if (w > maxPx || h > maxPx) {
              var r = Math.min(maxPx/w, maxPx/h);
              w = Math.round(w*r); h = Math.round(h*r);
            }
          var c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          var tex = new THREE.CanvasTexture(c);
          tex.encoding = THREE.sRGBEncoding;
          tex.wrapS = THREE.RepeatWrapping; tex.repeat.x = -1; tex.offset.x = 1;
          if (me.mat.map) { me.mat.map.dispose(); }
          me.mat.map = tex; me.mat.color.set(0xffffff); me.mat.needsUpdate = true;
          var wrap2 = document.getElementById(me.containerId);
          var ld2 = wrap2 && wrap2.querySelector('.pano-loading');
          var bar2 = document.getElementById('bar-' + me.containerId);
          var pct2 = document.getElementById('pct-' + me.containerId);
          if (ld2) ld2.style.display = 'none';
          if (bar2) { bar2.style.width = '100%'; setTimeout(function(){ bar2.style.width='0%'; }, 400); }
          if (pct2) pct2.textContent = '';
          URL.revokeObjectURL(blobUrl);
          if (onReady) onReady(); // 通知轉場：新場景已 ready
          // 套用場景調整
          var adj = sc.adjust;
          if (adj && me.renderer && me.renderer.domElement) {
            var b = 1+(adj.brightness||0)/100, ct = 1+(adj.contrast||0)/100, s = 1+(adj.saturation||0)/100;
            var f = 'brightness('+b.toFixed(2)+') contrast('+ct.toFixed(2)+') saturate('+s.toFixed(2)+')';
            if (adj.warmth > 0) f += ' sepia('+((adj.warmth/50)*0.35).toFixed(2)+')';
            if (adj.warmth < 0) f += ' hue-rotate('+(adj.warmth*0.8).toFixed(1)+'deg)';
            me.renderer.domElement.style.filter = f;
          } else if (me.renderer) {
            me.renderer.domElement.style.filter = '';
          }
        } catch(e) {
          if (ld) ld.innerHTML = '<div style="font-size:12px;color:#e05c5c">⚠️ 圖片處理失敗</div>';
        }
        };
        img.onerror = function() {
          URL.revokeObjectURL(blobUrl);
          if (ld) ld.innerHTML = '<div style="font-size:12px;color:#e05c5c">⚠️ 圖片載入失敗</div>';
        };
        img.src = blobUrl;
      };
      xhr.onerror = function() {
        if (ld) ld.innerHTML = '<div style="font-size:12px;color:#e05c5c">⚠️ 下載失敗，請確認圖片網址</div>';
      };
      xhr.send();
    };

    InlinePano.prototype.buildDots = function() {
      var me = this;
      var scenes = me.cfg.scenes || [];
      var acc = me.gold ? '#c4a35a' : '#7eb87a';
      me.dotsEl.innerHTML = '';
      if (scenes.length <= 1) return;
      scenes.forEach(function(sc, i) {
        var d = document.createElement('div');
        d.className = 'pano-dot' + (i === me.currentIdx ? ' active' : '');
        d.title = sc.name || '';
        d.addEventListener('click', function() { me.goScene(i); });
        me.dotsEl.appendChild(d);
      });
    };

    InlinePano.prototype.buildHs = function(hotspots) {
      var me = this;
      me.hotspots = hotspots;
      me.hsLayer.innerHTML = '';
      hotspots.forEach(function(hs) {
        var div = document.createElement('div');
        div.className = 'pano-hs'; div.dataset.hsid = hs.id;
        var size = hs.size || 40, color = hs.color || '#7eb87a';
        var inner = document.createElement('div');
        inner.className = 'pano-hs-inner';
        inner.style.cssText = 'width:'+size+'px;height:'+size+'px;background:'+color+'22;border:2.5px solid '+color+';font-size:'+Math.round(size*.42)+'px;';
        if (hs.pulse !== false) {
          var pulse = document.createElement('div');
          pulse.className = 'pano-hs-pulse';
          pulse.style.background = color + '55';
          inner.appendChild(pulse);
        }
        inner.appendChild(document.createTextNode(hs.icon || '🔵'));
        var lbl = document.createElement('div');
        lbl.className = 'pano-hs-label';
        lbl.textContent = hs.label || '前往';
        div.appendChild(inner); div.appendChild(lbl);
        div.addEventListener('click', function(e) {
          e.stopPropagation();
          if (hs.targetScene) {
            var tidx = (me.cfg.scenes || []).findIndex(function(s) { return s.id === hs.targetScene; });
            if (tidx >= 0) {
              // 交互淡化轉場
              var canvas = me.renderer.domElement;
              var wrap = document.getElementById(me.containerId);
              // 截圖當前畫面蓋住（需 preserveDrawingBuffer:true）
              me.renderer.render(me.scene, me.camera);
              var snapshot = '';
              try {
                var sn = canvas.toDataURL('image/jpeg', 0.80);
                if (sn && sn.length > 5000) snapshot = sn;
              } catch(er) {}

              if (snapshot && wrap) {
                // 建立/找到 crossfade overlay
                var xf = wrap.querySelector('.pano-xfade');
                if (!xf) {
                  xf = document.createElement('img');
                  xf.className = 'pano-xfade';
                  xf.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none;z-index:20;opacity:0;display:none;transition:opacity .65s ease;';
                  wrap.appendChild(xf);
                }
                // 把 canvas 的 CSS filter（調色）複製給 overlay，讓截圖顏色一致
                var currentFilter = me.renderer.domElement.style.filter || '';
                xf.src = snapshot;
                xf.style.filter = currentFilter;
                xf.style.display = 'block';
                xf.style.transition = 'none';
                xf.style.opacity = '1';
                // 切換場景（在截圖遮住時背景載入）
                me.goScene(tidx, null, function() {
                  // 新場景 ready → 淡出截圖，清除 filter
                  xf.style.transition = 'opacity .65s ease';
                  xf.style.opacity = '0';
                  setTimeout(function() { xf.style.display='none'; xf.src=''; xf.style.filter=''; }, 700);
                });
              } else {
                // 備用：canvas 淡出
                if (canvas) { canvas.style.transition='opacity .3s ease'; canvas.style.opacity='0'; }
                me.goScene(tidx, null, function() {
                  if (canvas) { canvas.style.transition='opacity .4s ease'; canvas.style.opacity='1'; }
                });
              }
            }
          }
        });
        me.hsLayer.appendChild(div);
      });
    };

    InlinePano.prototype.updateHs = function() {
      var me = this;
      var hots = me.hotspots || [];
      // 全螢幕時用視窗大小，否則用 canvas 實際大小
      var inFs = document.fullscreenElement === document.getElementById(me.containerId);
      var w = inFs ? window.innerWidth : me.renderer.domElement.clientWidth;
      var h = inFs ? window.innerHeight : me.renderer.domElement.clientHeight;
      hots.forEach(function(hs) {
        var el = me.hsLayer.querySelector('[data-hsid="'+hs.id+'"]');
        if (!el) return;
        var pos = new THREE.Vector3(
          Math.sin(hs.phi)*Math.sin(hs.theta),
          Math.cos(hs.phi),
          Math.sin(hs.phi)*Math.cos(hs.theta)
        );
        var fwd = new THREE.Vector3(0, 0, -1).applyEuler(me.camera.rotation);
        var dot = fwd.dot(pos.clone().normalize());
        if (dot < 0.1) { el.style.display = 'none'; return; }
        var proj = pos.clone().project(me.camera);
        var sx = (proj.x + 1) / 2 * w, sy = -(proj.y - 1) / 2 * h;
        if (sx < -50 || sx > w+50 || sy < -50 || sy > h+50) { el.style.display = 'none'; return; }
        el.style.display = 'block';
        el.style.left = sx + 'px'; el.style.top = sy + 'px';
        el.style.opacity = Math.min(1, (dot - 0.1) / 0.25);
      });
    };

    // Called when user clicks load button
    function initPano360(id) {

      if (!wrap) return;
      var configUrl = wrap.dataset.configUrl;

          });
      } else if (imageUrl) {
        startWithConfig({ scenes: [{ id:'s1', name:'360° 環景', imageUrl: imageUrl, hotspots:[] }] });
      }
    }


    function hl(t,kw,g){
      if(!kw||!t)return String(t||'');
      return String(t).replace(new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),function(m){return'<span class="hl'+(g?' gold':'')+'">'+m+'</span>';});
    }

    function matchKw(p,kw){
      if(!kw)return true;
      const q=kw.toLowerCase();
      return['name','location','date','tags','desc'].some(function(k){return(p[k]||'').toLowerCase().includes(q);});
    }

    function dataFor(type){
      if(type==='camping')return campingData;
      if(type==='moto')return motoData;
      if(type==='domestic')return domesticData;
      if(type==='overseas')return overseasData;
      return [];
    }
    function getFiltered(type){
      const list=dataFor(type);
      const s=state[type];
      return list.filter(function(p){
        const tagOk=s.tag==='全部'||(p.tags&&p.tags.split(',').map(function(t){return t.trim();}).includes(s.tag));
        const locOk=s.loc==='全部'||(p.location&&p.location.includes(s.loc));
        return tagOk&&locOk&&matchKw(p,s.kw);
      });
    }

    function plainText(desc){
      if(!desc)return'';
      if(desc.includes('|||')||desc.startsWith('{"')){
        var t='';desc.split('|||').forEach(function(p){try{var o=JSON.parse(p);t+=(o.text||'')+' ';}catch(e){t+=p+' ';}});return t.trim();
      }
      return desc;
    }

    function renderFull(desc,kw,g){
      if(!desc)return'';
      var ac=g?'var(--accent2)':'var(--accent)';
      if(desc.includes('|||')||desc.startsWith('{"')){
        return desc.split('|||').map(function(p){
          try{var o=JSON.parse(p);return'<div class="desc-block">'+(o.title?'<div class="desc-title" style="color:'+ac+'">'+hl(o.title,kw,g)+'</div>':'')+(o.text?'<div class="desc-text">'+hl(o.text,kw,g)+'</div>':'')+'</div>';}
          catch(e){return p.trim()?'<div class="desc-block"><div class="desc-text">'+hl(p,kw,g)+'</div></div>':'';}
        }).join('');
      }
      var hasEmoji=/\ud83c[\ud000-\udfff]|\ud83d[\ud000-\udfff]|\ud83e[\ud000-\udfff]|[\u2600-\u27ff]/.test(desc);
      if(hasEmoji){
        var parts=desc.split(/(?=\ud83c[\ud000-\udfff]|\ud83d[\ud000-\udfff]|\ud83e[\ud000-\udfff]|[\u2600-\u27ff])/).filter(function(s){return s.trim();});
        if(parts.length>1){
          return parts.map(function(seg){
            seg=seg.trim();if(!seg)return'';
            var bi=seg.indexOf('\u3011');
            var sp=bi>0?bi+1:seg.search(/\s{2}/);
            var title=sp>0?seg.slice(0,sp).trim():seg.split('\n')[0];
            var body=sp>0?seg.slice(sp).trim():'';
            return'<div class="desc-block"><div class="desc-title" style="color:'+ac+'">'+hl(title,kw,g)+'</div>'+(body?'<div class="desc-text">'+hl(body,kw,g)+'</div>':'')+'</div>';
          }).join('');
        }
      }
      return'<div class="desc-text">'+hl(desc,kw,g)+'</div>';
    }

    function toggleMore(btn,id){
      var el=document.getElementById('full-'+id);
      var open=el.classList.contains('open');
      el.classList.toggle('open');
      btn.textContent=open?'展開更多 ∨':'收起 ∧';
    }

    function filterId(type){return{camping:'camp-filter-bar',moto:'moto-filter-bar',domestic:'domestic-filter-bar',overseas:'overseas-filter-bar'}[type]||type+'-filter-bar';}
    function isGold(type){return type==='moto'||type==='overseas';}
    function buildFilter(type){
      var list=dataFor(type);
      var s=state[type];var g=isGold(type);
      var bid=filterId(type);
      var tagSet=new Set();list.forEach(function(p){if(p.tags)p.tags.split(',').forEach(function(t){if(t.trim())tagSet.add(t.trim());});});
      var tags=['全部'].concat(Array.from(tagSet));
      var locSet=new Set();list.forEach(function(p){if(p.location&&p.location.trim())locSet.add(p.location.trim());});
      var locs=Array.from(locSet);
      var count=getFiltered(type).length;
      document.getElementById(bid).innerHTML=
        tags.map(function(t){return'<button class="filter-tag'+(g?' gold':'')+(s.tag===t?' active':'')+'" onclick="setTag(\''+type+'\',\''+t.replace(/'/g,"\\'")+'\')">'+ t+'</button>';}).join('')+
        (locs.length?'<select class="filter-select" onchange="setLoc(\''+type+'\',this.value)"><option value="全部"'+(s.loc==='全部'?' selected':'')+'>所有地區</option>'+locs.map(function(l){return'<option value="'+l+'"'+(s.loc===l?' selected':'')+'>'+l+'</option>';}).join('')+'</select>':'')+
        '<span class="filter-count">'+count+' 個地點</span>';
    }

    function loadMore(type) {
      pageState[type] += PAGE_SIZE;
      render(type);
    }

    function setTag(t,tag){state[t].tag=tag;pageState[t]=PAGE_SIZE;buildFilter(t);render(t);}
    function setLoc(t,loc){state[t].loc=loc;pageState[t]=PAGE_SIZE;buildFilter(t);render(t);}
    function searchId(t){return{camping:'camp-search',moto:'moto-search',domestic:'domestic-search',overseas:'overseas-search'}[t]||t+'-search';}
    function clearId(t){return{camping:'camp-clear',moto:'moto-clear',domestic:'domestic-clear',overseas:'overseas-clear'}[t]||t+'-clear';}
    function onSearch(t){
      state[t].kw=document.getElementById(searchId(t)).value.trim();
      document.getElementById(clearId(t)).className='s-clear'+(state[t].kw?' show':'');
      pageState[t]=PAGE_SIZE;buildFilter(t);render(t);
    }
    function clearSearch(t){
      document.getElementById(searchId(t)).value='';
      state[t].kw='';
      document.getElementById(clearId(t)).className='s-clear';
      pageState[t]=PAGE_SIZE;buildFilter(t);render(t);
    }

    function parseImgField(raw){
      if(!raw)return{img:'',youtube:'',ig:''};
      if(raw.charAt(0)==='{'){
        try{var o=JSON.parse(raw);return{img:o.img||'',youtube:o.youtube||'',ig:o.ig||''};}
        catch(e){}
      }
      return{img:raw,youtube:'',ig:''};
    }

    function youtubeEmbedUrl(url){
      if(!url||!url.trim())return null;
      url=url.trim();
      // youtu.be/XXXX
      var m=url.match(/youtu\.be\/([^?&\s/]+)/);
      if(m)return'https://www.youtube.com/embed/'+m[1];
      // watch?v=XXXX or &v=XXXX
      m=url.match(/[?&]v=([^&\s]+)/);
      if(m)return'https://www.youtube.com/embed/'+m[1];
      // already embed URL
      m=url.match(/youtube\.com\/embed\/([^?&\s]+)/);
      if(m)return'https://www.youtube.com/embed/'+m[1];
      // shorts
      m=url.match(/youtube\.com\/shorts\/([^?&\s]+)/);
      if(m)return'https://www.youtube.com/embed/'+m[1];
      return null;
    }

    function containerId(type){return{camping:'camping-container',moto:'moto-container',domestic:'domestic-container',overseas:'overseas-container'}[type]||type+'-container';}
    function render(type){
      var filtered=getFiltered(type);var kw=state[type].kw;var g=isGold(type);
      var el=document.getElementById(containerId(type));
      if(!filtered.length){el.innerHTML='<div class="empty-msg">找不到符合條件的地點</div>';return;}

      // 分頁：有搜尋/篩選時顯示全部；否則只顯示 pageState 筆數
      var isFiltering = (state[type].kw || state[type].tag !== '全部' || state[type].loc !== '全部');
      var showCount = isFiltering ? filtered.length : Math.min(pageState[type], filtered.length);
      var displayed = filtered.slice(0, showCount);

      var html=displayed.map(function(p){
        cid++;var id='c'+cid;
        var imgP=parseImgField(p.img||'');
        var ytUrl=youtubeEmbedUrl(imgP.youtube||p.youtube||'');
        var igUrl=(imgP.ig||p.ig||'').trim();
        var descHtml=renderFull(p.desc,kw,g);
        // 第一層封面圖
        var thumbHtml=imgP.img
          ?'<img class="card-img" src="'+imgP.img+'" alt="'+p.name+'" loading="lazy">'
          :'';
        // 標籤
        var tagsHtml=p.tags
          ?'<div class="card-tags">'+p.tags.split(',').map(function(t){
              return'<span class="badge badge-'+(g?'gold':'green')+'">'+t.trim()+'</span>';
            }).join('')+'</div>'
          :'';
        // 展開內容
        // 解析 pano360 欄位：支援圖片 / 切片資料夾 / config.json
        var pano360Html='';
        var panoRaw=(p.pano360||'').trim();
        if(panoRaw){
          var panoId='pano-'+id;
          var panoAttrs=' data-gold="'+g+'"';
          if(panoRaw.endsWith('/')){
            // 切片模式（tileBaseUrl）
            panoAttrs+=' data-tile-url="'+panoRaw+'"';
          } else if(panoRaw.endsWith('.json')||panoRaw.includes('raw.githubusercontent.com')){
            // GitHub config.json
            panoAttrs+=' data-config-url="'+panoRaw+'"';
          } else {
            // 直接圖片網址
            panoAttrs+=' data-image-url="'+panoRaw+'"';
          }
          pano360Html='<div class="pano-placeholder" id="'+panoId+'"'+panoAttrs+' onclick="initPano360AndReplace(\''+panoId+'\')">'+
            '<div class="pano-placeholder-icon">🌐</div>'+
            '<div class="pano-placeholder-text">360° 互動全景</div>'+
            '<div class="pano-placeholder-btn">▶ 點擊載入</div>'+
          '</div>';
        }
        var hasExpand=!!(descHtml||pano360Html||ytUrl||igUrl);
        var expandHtml='';
        if(descHtml)expandHtml+=descHtml;
        if(pano360Html)expandHtml+=pano360Html;
        if(ytUrl)expandHtml+=
          '<div class="yt-wrap"><iframe src="'+ytUrl+'"'+
          ' allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"'+
          ' allowfullscreen></iframe></div><p class="yt-caption">▶ YouTube 影片</p>';
        if(igUrl)expandHtml+=
          '<a class="ig-link" href="'+igUrl+'" target="_blank" rel="noopener">'+
          '<span style="font-size:16px">📸</span>在 Instagram 查看貼文</a>';
        return'<div class="card">'+
          thumbHtml+
          '<div class="card-body">'+
            '<div class="card-title">'+hl(p.name,kw,g)+'</div>'+
            '<div class="card-meta">'+hl(p.location||'',kw,g)+(p.date?' · '+p.date:'')+'</div>'+
            tagsHtml+
            (hasExpand?'<button class="btn-more" onclick="toggleMore(this,\''+id+'\')">展開更多 ∨</button>':'')+
            (hasExpand?'<div class="card-full" id="full-'+id+'">'+expandHtml+'</div>':'')+
          '</div>'+
        '</div>';
      }).join('');
      el.innerHTML=html;

      // 「載入更多」按鈕
      if (!isFiltering && showCount < filtered.length) {
        var remaining = filtered.length - showCount;
        var btn = document.createElement('div');
        btn.style.cssText = 'text-align:center;padding:1.5rem 0 0.5rem;grid-column:1/-1;';
        btn.innerHTML = '<button onclick="loadMore(\''+type+'\')" style="padding:10px 32px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;letter-spacing:0.05em;">載入更多（還有 '+remaining+' 個地點）</button>';
        el.appendChild(btn);
      }
    }

    function loadSocial(data){
      if(!data)return;
      var s;try{s=JSON.parse(data);}catch(e){return;}
      var links=[];
      if(s.fb)links.push('<a class="social-btn fb" href="'+s.fb+'" target="_blank"><span style="font-size:16px">📘</span>Facebook</a>');
      if(s.ig)links.push('<a class="social-btn ig" href="'+s.ig+'" target="_blank"><span style="font-size:16px">📸</span>Instagram</a>');
      if(s.line)links.push('<a class="social-btn line" href="'+s.line+'" target="_blank"><span style="font-size:16px">💬</span>Line 加好友</a>');
      if(s.lineQr)links.push('<div class="qr-block"><img src="'+s.lineQr+'" alt="Line QR"><div class="qr-label">掃描加入 Line</div></div>');
      if(links.length){document.getElementById('social-section').style.display='block';document.getElementById('social-links').innerHTML=links.join('');}
    }

    function initPano360AndReplace(id) {
      var wrap = document.getElementById(id);
      if (!wrap) return;
      // 先顯示「載入中」，再動態載入 Three.js
      wrap.className = 'pano-wrap';
      wrap.style.cssText = 'height:340px;position:relative;border-radius:8px;overflow:hidden;background:#0a0f0a;margin-top:1.25rem;';
      wrap.onclick = null;
      wrap.removeAttribute('onclick');
      wrap.innerHTML = '<div class="pano-loading"><div class="pano-ring"></div><div class="pano-loading-text">載入 3D 引擎中...</div></div>';
      loadThreeJS(function() { _doInitPano360(id, wrap); });
    }

    function _doInitPano360(id, wrap) {
      var configUrl = wrap.dataset.configUrl;
      var imageUrl  = wrap.dataset.imageUrl;
      var tileUrl   = wrap.dataset.tileUrl;
      var cfgRaw    = wrap.dataset.cfg;
      var gold      = wrap.dataset.gold === 'true';

      function startWithConfig(cfg) {
        _panoViewers[id] = new InlinePano(id, cfg, gold);
      }

      // 切片模式：自動建立單場景 config
      if (tileUrl) {
        startWithConfig({ scenes: [{ id:'s1', name:'360° 環景', tileBaseUrl: tileUrl, hotspots:[] }] });
      } else if (configUrl) {
        wrap.innerHTML = '<div class="pano-loading"><div class="pano-ring"></div><div class="pano-loading-text">載入設定中...</div></div>';
        fetch(configUrl)
          .then(function(r) { return r.json(); })
          .then(startWithConfig)
          .catch(function() {
            wrap.innerHTML = '<div style="padding:2rem;text-align:center;color:#e05c5c;font-size:13px;">⚠️ 無法載入設定<br><small>請確認 GitHub URL 正確且 Repo 為 Public</small></div>';
          });
      } else if (cfgRaw) {
        try { startWithConfig(JSON.parse(decodeURIComponent(cfgRaw))); }
        catch(e) { wrap.innerHTML = '<div style="padding:2rem;text-align:center;color:#e05c5c;font-size:13px;">⚠️ 設定解析失敗</div>'; }
      } else if (imageUrl) {
        startWithConfig({ scenes: [{ id:'s1', name:'360° 環景', imageUrl: imageUrl, hotspots:[] }] });
      }
    }

    var ALL_TYPES = ['camping','moto','domestic','overseas'];
    async function init(){
      try{
        var results=await Promise.all([
          fetch(API+'?sheet=camping').then(function(r){return r.json();}).catch(function(){return[];}),
          fetch(API+'?sheet=moto').then(function(r){return r.json();}).catch(function(){return[];}),
          fetch(API+'?sheet=social').then(function(r){return r.json();}).catch(function(){return[];}),
          fetch(API+'?sheet=domestic').then(function(r){return r.json();}).catch(function(){return[];}),
          fetch(API+'?sheet=overseas').then(function(r){return r.json();}).catch(function(){return[];})
        ]);
        campingData=Array.isArray(results[0])?results[0]:[];
        motoData=Array.isArray(results[1])?results[1]:[];
        domesticData=Array.isArray(results[3])?results[3]:[];
        overseasData=Array.isArray(results[4])?results[4]:[];
        var soc=results[2];
        if(soc&&soc[0]&&soc[0].data)loadSocial(soc[0].data);
        ALL_TYPES.forEach(function(t){
          try { buildFilter(t); render(t); } catch(te) {
            var el=document.getElementById(containerId(t));
            if(el)el.innerHTML='<div class="empty-msg">顯示失敗（'+te.message+'）</div>';
          }
        });
      }catch(e){
        ALL_TYPES.forEach(function(t){
          var el=document.getElementById(containerId(t));
          if(el)el.innerHTML='<div class="empty-msg">載入失敗，請重新整理</div>';
        });
      }
    }
    init();
  </script>
