<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理 · Syue & Lynn</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1410;
    --surface: #1a1f1b;
    --surface2: #222820;
    --border: #2e352c;
    --text: #e8e4dc;
    --muted: #8a9088;
    --accent: #7eb87a;
    --accent2: #c4a35a;
    --danger: #e05c5c;
    --danger-bg: rgba(224,92,92,0.1);
    --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; }

  /* Login */
  #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:2.5rem 2rem; width:340px; }
  .login-logo { font-family:'Playfair Display',serif; font-size:20px; color:var(--accent2); margin-bottom:0.25rem; }
  .login-card p { font-size:13px; color:var(--muted); margin-bottom:1.75rem; }
  .login-card input { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius); font-size:15px; margin-bottom:1rem; background:var(--bg); color:var(--text); }
  .login-card input:focus { outline:none; border-color:var(--accent); }
  .btn-primary { width:100%; padding:11px; background:var(--accent); color:#0f1410; border:none; border-radius:var(--radius); font-size:15px; font-weight:600; cursor:pointer; }
  .login-error { color:var(--danger); font-size:13px; margin-top:0.75rem; display:none; }

  /* Admin layout */
  #admin-screen { display:none; min-height:100vh; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:0 2rem; height:56px; border-bottom:1px solid var(--border); background:rgba(15,20,16,0.95); position:sticky; top:0; z-index:100; }
  .topbar-logo { font-family:'Playfair Display',serif; font-size:16px; color:var(--accent2); }
  .topbar-right { display:flex; gap:1rem; align-items:center; }
  .btn-sm { padding:6px 14px; border-radius:8px; font-size:13px; font-weight:500; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; }
  .btn-sm:hover { color:var(--text); border-color:#4a5448; }
  .btn-danger-sm { padding:6px 14px; border-radius:8px; font-size:13px; font-weight:500; border:1px solid var(--danger); background:var(--danger-bg); color:var(--danger); cursor:pointer; }

  .main { display:flex; }
  .sidebar { width:200px; min-height:calc(100vh - 56px); background:var(--surface); border-right:1px solid var(--border); padding:1.5rem 0; flex-shrink:0; }
  .sidebar-label { font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:#4a5448; padding:1.25rem 1.5rem 0.5rem; }
  .sidebar-item { display:flex; align-items:center; gap:10px; padding:10px 1.5rem; font-size:14px; color:var(--muted); cursor:pointer; border-left:2px solid transparent; }
  .sidebar-item:hover { color:var(--text); }
  .sidebar-item.active { color:var(--accent); border-left-color:var(--accent); background:rgba(126,184,122,0.06); }

  .content { flex:1; padding:2rem; max-width:900px; }
  .page { display:none; }
  .page.active { display:block; }
  .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.75rem; }
  .page-header h2 { font-size:22px; font-weight:500; }
  .btn-add { padding:9px 18px; background:var(--accent); color:#0f1410; border:none; border-radius:var(--radius); font-size:14px; font-weight:600; cursor:pointer; }
  .btn-add.gold { background:var(--accent2); }

  /* Stats */
  .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:2rem; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; }
  .stat-num { font-size:28px; font-weight:600; color:var(--accent); margin-bottom:4px; }
  .stat-label { font-size:13px; color:var(--muted); }

  /* Place cards */
  .place-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem 1.5rem; margin-bottom:1rem; display:flex; align-items:flex-start; gap:1rem; }
  .place-thumb { width:72px; height:72px; border-radius:8px; flex-shrink:0; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:24px; border:1px solid var(--border); overflow:hidden; }
  .place-thumb img { width:100%; height:100%; object-fit:cover; }
  .place-info { flex:1; }
  .place-name { font-size:16px; font-weight:500; margin-bottom:3px; }
  .place-meta { font-size:12px; color:var(--muted); margin-bottom:6px; }
  .place-desc { font-size:13px; color:var(--muted); line-height:1.5; }
  .place-actions { display:flex; gap:8px; flex-shrink:0; }
  .badge-tag { display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; margin-right:4px; background:rgba(126,184,122,0.1); color:var(--accent); border:1px solid rgba(126,184,122,0.2); }
  .badge-tag.gold { background:rgba(196,163,90,0.1); color:var(--accent2); border-color:rgba(196,163,90,0.2); }

  /* Modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:2rem; width:580px; max-width:95vw; max-height:90vh; overflow-y:auto; }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
  .modal-header h3 { font-size:18px; font-weight:500; }
  .modal-close { background:none; border:none; font-size:22px; cursor:pointer; color:var(--muted); }
  .form-group { margin-bottom:1.25rem; }
  .form-group label { display:block; font-size:12px; font-weight:500; margin-bottom:6px; color:var(--muted); letter-spacing:0.05em; text-transform:uppercase; }
  .form-group input, .form-group textarea { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius); font-size:14px; background:var(--bg); color:var(--text); font-family:inherit; }
  .form-group input:focus, .form-group textarea:focus { outline:none; border-color:var(--accent); }
  .form-group textarea { resize:vertical; min-height:90px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .modal-footer { display:flex; justify-content:flex-end; gap:10px; margin-top:1.5rem; }
  .btn-cancel { padding:9px 20px; border-radius:var(--radius); font-size:14px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; }
  .btn-save { padding:9px 20px; border-radius:var(--radius); font-size:14px; font-weight:600; background:var(--accent); color:#0f1410; border:none; cursor:pointer; }
  .btn-save.gold { background:var(--accent2); }

  /* Upload */
  .upload-area { border:1px dashed var(--border); border-radius:var(--radius); padding:1.5rem; text-align:center; cursor:pointer; background:var(--bg); }
  .upload-area:hover { border-color:var(--accent); }
  .upload-area p { font-size:13px; color:var(--muted); margin-top:6px; }
  .upload-preview { width:100%; max-height:180px; object-fit:cover; border-radius:8px; margin-top:10px; display:none; }

  /* ── 萬年曆 ── */
  .date-input-wrap { position:relative; }
  .date-display { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius); font-size:14px; background:var(--bg); color:var(--text); cursor:pointer; text-align:left; display:flex; align-items:center; justify-content:space-between; }
  .date-display:hover { border-color:#4a5448; }
  .date-display .placeholder { color:var(--muted); }
  .calendar-popup { display:none; position:absolute; top:calc(100% + 8px); left:0; z-index:500; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; width:320px; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
  .calendar-popup.open { display:block; }
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.75rem; }
  .cal-nav { background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; padding:4px 8px; border-radius:6px; }
  .cal-nav:hover { background:var(--surface2); color:var(--text); }
  .cal-title { font-size:14px; font-weight:500; color:var(--text); cursor:pointer; }
  .cal-title:hover { color:var(--accent); }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
  .cal-dow { font-size:11px; color:var(--muted); text-align:center; padding:4px 0; }
  .cal-day { font-size:13px; text-align:center; padding:6px 2px; border-radius:6px; cursor:pointer; color:var(--text); }
  .cal-day:hover { background:var(--surface2); }
  .cal-day.other-month { color:#3e4a3c; }
  .cal-day.today { color:var(--accent); font-weight:600; }
  .cal-day.selected { background:var(--accent); color:#0f1410; font-weight:600; }
  .cal-day.in-range { background:rgba(126,184,122,0.15); }
  .cal-day.range-start { background:var(--accent); color:#0f1410; border-radius:6px 0 0 6px; }
  .cal-day.range-end { background:var(--accent); color:#0f1410; border-radius:0 6px 6px 0; }
  .cal-day.disabled { color:#2e352c; cursor:default; pointer-events:none; }
  .cal-months, .cal-years { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .cal-month-item, .cal-year-item { font-size:13px; text-align:center; padding:8px 4px; border-radius:6px; cursor:pointer; color:var(--text); }
  .cal-month-item:hover, .cal-year-item:hover { background:var(--surface2); }
  .cal-month-item.active, .cal-year-item.active { background:var(--accent); color:#0f1410; font-weight:600; }
  .cal-range-hint { font-size:11px; color:var(--muted); text-align:center; margin-bottom:0.5rem; letter-spacing:0.05em; }
  .cal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:0.75rem; border-top:1px solid var(--border); padding-top:0.75rem; }
  .cal-btn { font-size:12px; padding:5px 12px; border-radius:6px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); }
  .cal-btn.confirm { background:var(--accent); color:#0f1410; border-color:var(--accent); font-weight:600; }

  /* ── 帳號設定頁 ── */
  .settings-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; margin-bottom:1.5rem; }
  .settings-card h3 { font-size:16px; font-weight:500; margin-bottom:1.25rem; color:var(--text); }
  .settings-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
  .input-with-toggle { position:relative; }
  .input-with-toggle input { width:100%; padding:10px 40px 10px 14px; border:1px solid var(--border); border-radius:var(--radius); font-size:14px; background:var(--bg); color:var(--text); }
  .input-with-toggle input:focus { outline:none; border-color:var(--accent); }
  .toggle-pw { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; }
  .btn-save-settings { padding:10px 24px; background:var(--accent); color:#0f1410; border:none; border-radius:var(--radius); font-size:14px; font-weight:600; cursor:pointer; }
  .settings-hint { font-size:12px; color:var(--muted); margin-top:0.5rem; }
  .current-account { font-size:13px; color:var(--muted); margin-bottom:1rem; padding:10px 14px; background:var(--surface2); border-radius:8px; }
  .current-account span { color:var(--accent); font-weight:500; }

  /* Misc */
  .empty-state { text-align:center; padding:3rem; color:var(--muted); font-size:14px; }
  .saving-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; align-items:center; justify-content:center; font-size:14px; color:var(--text); letter-spacing:0.1em; }
  .saving-overlay.show { display:flex; }
  .toast { position:fixed; bottom:2rem; right:2rem; background:var(--accent); color:#0f1410; padding:12px 20px; border-radius:var(--radius); font-size:14px; font-weight:600; z-index:999; transform:translateY(100px); opacity:0; transition:all 0.3s; }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.error { background:var(--danger); color:#fff; }
</style>
</head>
<body>

<!-- 登入 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Syue & Lynn</div>
    <p>後台管理系統</p>
    <input type="text" id="login-user" placeholder="帳號" onkeydown="if(event.key==='Enter')doLogin()">
    <input type="password" id="login-pw" placeholder="密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-primary" onclick="doLogin()">登入</button>
    <p class="login-error" id="login-error">帳號或密碼錯誤</p>
  </div>
</div>

<!-- 後台 -->
<div id="admin-screen">
  <div class="topbar">
    <div class="topbar-logo">Syue & Lynn · 後台</div>
    <div class="topbar-right">
      <a href="index.html" target="_blank"><button class="btn-sm">查看網站 ↗</button></a>
      <button class="btn-danger-sm" onclick="doLogout()">登出</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-label">管理</div>
      <div class="sidebar-item active" onclick="showPage('dashboard')"><span>◈</span> 總覽</div>
      <div class="sidebar-item" onclick="showPage('camping')"><span>▲</span> 露營地點</div>
      <div class="sidebar-item" onclick="showPage('moto')"><span>◎</span> 重機地點</div>
      <div class="sidebar-label">設定</div>
      <div class="sidebar-item" onclick="showPage('settings')"><span>⚙</span> 帳號設定</div>
    </div>
    <div class="content">

      <!-- 總覽 -->
      <div class="page active" id="page-dashboard">
        <div class="page-header"><h2>總覽</h2></div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-num" id="stat-camp">-</div><div class="stat-label">露營地點</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-moto">-</div><div class="stat-label">重機地點</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-360">-</div><div class="stat-label">360 環景</div></div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;">
          <p style="font-size:13px;color:var(--muted);margin-bottom:1rem;letter-spacing:0.05em;text-transform:uppercase;">快速新增</p>
          <div style="display:flex;gap:1rem;">
            <button class="btn-add" onclick="showPage('camping');openModal('camping')">+ 露營地點</button>
            <button class="btn-add gold" onclick="showPage('moto');openModal('moto')">+ 重機地點</button>
          </div>
        </div>
      </div>

      <!-- 露營 -->
      <div class="page" id="page-camping">
        <div class="page-header"><h2>露營地點</h2><button class="btn-add" onclick="openModal('camping')">+ 新增地點</button></div>
        <div id="camping-list"></div>
      </div>

      <!-- 重機 -->
      <div class="page" id="page-moto">
        <div class="page-header"><h2>重機地點</h2><button class="btn-add gold" onclick="openModal('moto')">+ 新增地點</button></div>
        <div id="moto-list"></div>
      </div>

      <!-- 帳號設定 -->
      <div class="page" id="page-settings">
        <div class="page-header"><h2>帳號設定</h2></div>

        <div class="settings-card">
          <h3>目前帳號</h3>
          <div class="current-account">帳號：<span id="display-username"></span></div>
          <p class="settings-hint">修改後需要重新登入</p>
        </div>

        <div class="settings-card">
          <h3>修改帳號</h3>
          <div class="form-group">
            <label>新帳號</label>
            <input type="text" id="new-username" placeholder="輸入新帳號">
          </div>
          <button class="btn-save-settings" onclick="saveUsername()">儲存帳號</button>
        </div>

        <div class="settings-card">
          <h3>修改密碼</h3>
          <div class="form-group">
            <label>目前密碼</label>
            <div class="input-with-toggle">
              <input type="password" id="current-pw" placeholder="輸入目前密碼">
              <button class="toggle-pw" onclick="togglePw('current-pw')">👁</button>
            </div>
          </div>
          <div class="settings-row">
            <div class="form-group">
              <label>新密碼</label>
              <div class="input-with-toggle">
                <input type="password" id="new-pw" placeholder="至少 6 個字元">
                <button class="toggle-pw" onclick="togglePw('new-pw')">👁</button>
              </div>
            </div>
            <div class="form-group">
              <label>確認新密碼</label>
              <div class="input-with-toggle">
                <input type="password" id="confirm-pw" placeholder="再輸入一次">
                <button class="toggle-pw" onclick="togglePw('confirm-pw')">👁</button>
              </div>
            </div>
          </div>
          <button class="btn-save-settings" onclick="savePassword()">修改密碼</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- 新增／編輯 Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">新增地點</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <input type="hidden" id="edit-idx">
    <input type="hidden" id="edit-type">
    <div class="form-row">
      <div class="form-group">
        <label>地點名稱 *</label>
        <input type="text" id="f-name" placeholder="例：台北高級露營區">
      </div>
      <div class="form-group">
        <label>地區</label>
        <input type="text" id="f-location" placeholder="例：台北市">
      </div>
    </div>

    <!-- 萬年曆日期區間 -->
    <div class="form-group">
      <label>旅遊日期</label>
      <div class="date-input-wrap">
        <div class="date-display" id="date-display" onclick="toggleCalendar()">
          <span id="date-display-text" class="placeholder">選擇日期或區間</span>
          <span style="color:var(--muted);font-size:12px;">📅</span>
        </div>
        <div class="calendar-popup" id="calendar-popup">
          <div class="cal-range-hint" id="cal-hint">點選開始日期</div>
          <div class="cal-header">
            <button class="cal-nav" onclick="calNav(-1)">‹</button>
            <span class="cal-title" onclick="toggleCalView()" id="cal-title">2025年 4月</span>
            <button class="cal-nav" onclick="calNav(1)">›</button>
          </div>
          <div id="cal-body"></div>
          <div class="cal-actions">
            <button class="cal-btn" onclick="clearDate()">清除</button>
            <button class="cal-btn confirm" onclick="confirmDate()">確認</button>
          </div>
        </div>
      </div>
      <input type="hidden" id="f-date">
    </div>

    <div class="form-group">
      <label>標籤（逗號分隔）</label>
      <input type="text" id="f-tags" placeholder="例：山景,親子,需預約">
    </div>
    <div class="form-group">
      <label>介紹文字</label>
      <textarea id="f-desc" placeholder="寫下這個地點的特色、心得、注意事項..."></textarea>
    </div>
    <div class="form-group">
      <label>Kuula 360 嵌入碼</label>
      <textarea id="f-kuula" placeholder="貼上 Kuula 的 <script> 嵌入碼..." style="min-height:70px;font-size:12px;font-family:monospace;"></textarea>
    </div>
    <div class="form-group">
      <label>封面照片網址</label>
      <input type="text" id="f-img-url" placeholder="貼上圖片網址（Google 雲端硬碟等）">
    </div>
    <div class="form-group">
      <label>或直接上傳照片</label>
      <div class="upload-area" onclick="document.getElementById('f-img-input').click()">
        <div style="font-size:24px;">📷</div>
        <p>點擊選擇照片</p>
        <input type="file" id="f-img-input" accept="image/*" style="display:none" onchange="previewImg(this)">
        <img id="f-img-preview" class="upload-preview">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" id="btn-save" onclick="savePlace()">儲存</button>
    </div>
  </div>
</div>

<div class="saving-overlay" id="saving-overlay">儲存中，請稍候...</div>
<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzPguC2eh8JP1x1GAOaqodo9r4nb1BPEE4JayJoQxBF-31jZTLl02pIj1ADQ8SGyHxcDw/exec';
const ACCOUNT_KEY = 'sl_account';

// ── 帳號管理 ──
function getAccount() {
  const saved = localStorage.getItem(ACCOUNT_KEY);
  if (saved) return JSON.parse(saved);
  return { username: 'syuelynn', password: 'syuelynn2025' };
}
function saveAccount(obj) { localStorage.setItem(ACCOUNT_KEY, JSON.stringify(obj)); }

function doLogin() {
  const acc = getAccount();
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pw').value;
  if (u === acc.username && p === acc.password) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    document.getElementById('display-username').textContent = acc.username;
    loadAll();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pw').value = '';
}
function saveUsername() {
  const newU = document.getElementById('new-username').value.trim();
  if (!newU) { showToast('請輸入新帳號', true); return; }
  const acc = getAccount();
  acc.username = newU;
  saveAccount(acc);
  document.getElementById('display-username').textContent = newU;
  document.getElementById('new-username').value = '';
  showToast('帳號已更新，請重新登入');
  setTimeout(doLogout, 1500);
}
function savePassword() {
  const cur = document.getElementById('current-pw').value;
  const nw = document.getElementById('new-pw').value;
  const cf = document.getElementById('confirm-pw').value;
  const acc = getAccount();
  if (cur !== acc.password) { showToast('目前密碼錯誤', true); return; }
  if (nw.length < 6) { showToast('新密碼至少需要 6 個字元', true); return; }
  if (nw !== cf) { showToast('兩次密碼不一致', true); return; }
  acc.password = nw;
  saveAccount(acc);
  ['current-pw','new-pw','confirm-pw'].forEach(id => document.getElementById(id).value = '');
  showToast('密碼已更新，請重新登入');
  setTimeout(doLogout, 1500);
}
function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}

// ── 萬年曆 ──
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DOWS = ['日','一','二','三','四','五','六'];
let calYear, calMonth, calView = 'days';
let rangeStart = null, rangeEnd = null, selecting = false;

function initCal() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
}
function toggleCalendar() {
  const popup = document.getElementById('calendar-popup');
  if (popup.classList.contains('open')) {
    popup.classList.remove('open');
  } else {
    initCal();
    calView = 'days';
    renderCal();
    popup.classList.add('open');
  }
}
function toggleCalView() {
  calView = calView === 'days' ? 'months' : 'days';
  renderCal();
}
function calNav(dir) {
  if (calView === 'days') {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0) { calMonth = 11; calYear--; }
  } else {
    calYear += dir;
  }
  renderCal();
}
function renderCal() {
  const body = document.getElementById('cal-body');
  document.getElementById('cal-title').textContent = calYear + '年 ' + MONTHS[calMonth];
  if (calView === 'months') {
    body.innerHTML = `<div class="cal-months">${MONTHS.map((m,i)=>`<div class="cal-month-item${i===calMonth?' active':''}" onclick="selectMonth(${i})">${m}</div>`).join('')}</div>`;
    return;
  }
  const first = new Date(calYear, calMonth, 1).getDay();
  const days = new Date(calYear, calMonth+1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  let html = DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for (let i=0; i<first; i++) {
    const d = prevDays - first + 1 + i;
    html += `<div class="cal-day other-month">${d}</div>`;
  }
  for (let d=1; d<=days; d++) {
    const dt = new Date(calYear, calMonth, d);
    let cls = 'cal-day';
    if (dt.getTime() === today.getTime()) cls += ' today';
    if (rangeStart && rangeEnd) {
      const s = new Date(rangeStart); s.setHours(0,0,0,0);
      const e = new Date(rangeEnd); e.setHours(0,0,0,0);
      if (dt.getTime() === s.getTime()) cls += ' range-start';
      else if (dt.getTime() === e.getTime()) cls += ' range-end';
      else if (dt > s && dt < e) cls += ' in-range';
    } else if (rangeStart) {
      const s = new Date(rangeStart); s.setHours(0,0,0,0);
      if (dt.getTime() === s.getTime()) cls += ' selected';
    }
    html += `<div class="${cls}" onclick="selectDay(${calYear},${calMonth},${d})">${d}</div>`;
  }
  const remaining = 42 - first - days;
  for (let d=1; d<=remaining; d++) html += `<div class="cal-day other-month">${d}</div>`;
  body.innerHTML = html;
  const hint = document.getElementById('cal-hint');
  if (!rangeStart) hint.textContent = '點選開始日期';
  else if (!rangeEnd) hint.textContent = '再點選結束日期（或同一天表示單日）';
  else hint.textContent = formatDateRange(rangeStart, rangeEnd);
}
function selectMonth(m) { calMonth = m; calView = 'days'; renderCal(); }
function selectDay(y, m, d) {
  const dt = new Date(y, m, d);
  if (!rangeStart || (rangeStart && rangeEnd)) {
    rangeStart = dt; rangeEnd = null;
  } else {
    if (dt < rangeStart) { rangeEnd = rangeStart; rangeStart = dt; }
    else if (dt.getTime() === rangeStart.getTime()) { rangeEnd = dt; }
    else { rangeEnd = dt; }
  }
  renderCal();
}
function formatDate(dt) {
  return dt.getFullYear() + '年' + (dt.getMonth()+1) + '月' + dt.getDate() + '日';
}
function formatDateRange(s, e) {
  if (!e || s.getTime() === e.getTime()) return formatDate(s);
  return formatDate(s) + ' ~ ' + formatDate(e);
}
function confirmDate() {
  if (!rangeStart) { showToast('請先選擇日期', true); return; }
  const val = formatDateRange(rangeStart, rangeEnd || rangeStart);
  document.getElementById('f-date').value = val;
  const display = document.getElementById('date-display-text');
  display.textContent = val;
  display.classList.remove('placeholder');
  document.getElementById('calendar-popup').classList.remove('open');
}
function clearDate() {
  rangeStart = null; rangeEnd = null;
  document.getElementById('f-date').value = '';
  const display = document.getElementById('date-display-text');
  display.textContent = '選擇日期或區間';
  display.classList.add('placeholder');
  document.getElementById('calendar-popup').classList.remove('open');
}
document.addEventListener('click', e => {
  const wrap = document.querySelector('.date-input-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('calendar-popup').classList.remove('open');
  }
});

// ── 資料管理 ──
let campingData = [], motoData = [];
let currentType = 'camping', editingIdx = null, imgData = null;

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const idx = ['dashboard','camping','moto','settings'].indexOf(name);
  document.querySelectorAll('.sidebar-item')[idx].classList.add('active');
  if (name === 'camping') renderList('camping');
  if (name === 'moto') renderList('moto');
  if (name === 'settings') document.getElementById('display-username').textContent = getAccount().username;
}

async function loadAll() {
  try {
    const [c, m] = await Promise.all([
      fetch(API + '?sheet=camping').then(r => r.json()),
      fetch(API + '?sheet=moto').then(r => r.json())
    ]);
    campingData = c; motoData = m;
    updateStats(); renderList('camping'); renderList('moto');
  } catch(e) { showToast('載入失敗，請重新整理', true); }
}

function updateStats() {
  document.getElementById('stat-camp').textContent = campingData.length;
  document.getElementById('stat-moto').textContent = motoData.length;
  document.getElementById('stat-360').textContent = [...campingData,...motoData].filter(p=>p.kuula).length;
}

function renderList(type) {
  const list = type === 'camping' ? campingData : motoData;
  const el = document.getElementById(type + '-list');
  const isGold = type === 'moto';
  if (!list.length) { el.innerHTML = `<div class="empty-state">還沒有${type==='camping'?'露營':'重機'}地點，點上方按鈕新增！</div>`; return; }
  el.innerHTML = list.map((p,i) => `
    <div class="place-card">
      <div class="place-thumb">${p.img?`<img src="${p.img}" alt="${p.name}">`:(type==='camping'?'▲':'◎')}</div>
      <div class="place-info">
        <div class="place-name">${p.name}</div>
        <div class="place-meta">${p.location||''}${p.date?' · '+p.date:''}${p.kuula?' · <span style="color:var(--accent)">360°</span>':''}</div>
        ${p.tags?p.tags.split(',').map(t=>`<span class="badge-tag ${isGold?'gold':''}">${t.trim()}</span>`).join(''):''}
        <div class="place-desc">${p.desc||''}</div>
      </div>
      <div class="place-actions">
        <button class="btn-sm" onclick="editPlace('${type}',${i})">編輯</button>
        <button class="btn-danger-sm" onclick="deletePlace('${type}',${i})">刪除</button>
      </div>
    </div>`).join('');
}

function openModal(type, idx) {
  currentType = type; editingIdx = idx !== undefined ? idx : null;
  document.getElementById('modal-title').textContent = (idx!==undefined?'編輯':'新增')+(type==='camping'?'露營':'重機')+'地點';
  document.getElementById('edit-type').value = type;
  document.getElementById('btn-save').className = 'btn-save'+(type==='moto'?' gold':'');
  rangeStart = null; rangeEnd = null;
  clearFormFields();
  if (idx !== undefined) {
    const p = (type==='camping'?campingData:motoData)[idx];
    document.getElementById('f-name').value = p.name||'';
    document.getElementById('f-location').value = p.location||'';
    document.getElementById('f-date').value = p.date||'';
    if (p.date) {
      const dt = document.getElementById('date-display-text');
      dt.textContent = p.date; dt.classList.remove('placeholder');
    }
    document.getElementById('f-tags').value = p.tags||'';
    document.getElementById('f-desc').value = p.desc||'';
    document.getElementById('f-kuula').value = p.kuula||'';
    document.getElementById('f-img-url').value = (!p.img||p.img.startsWith('data:'))?'':p.img;
    if (p.img && p.img.startsWith('data:')) {
      document.getElementById('f-img-preview').src = p.img;
      document.getElementById('f-img-preview').style.display = 'block';
      imgData = p.img;
    }
  }
  document.getElementById('modal-overlay').classList.add('open');
}
function editPlace(type, idx) { showPage(type); openModal(type, idx); }
async function deletePlace(type, idx) {
  if (!confirm('確定要刪除？')) return;
  if (type==='camping') campingData.splice(idx,1); else motoData.splice(idx,1);
  await saveToSheets(type); renderList(type); updateStats();
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); clearFormFields(); }
function clearFormFields() {
  ['f-name','f-location','f-tags','f-desc','f-kuula','f-img-url','f-date'].forEach(id => document.getElementById(id).value='');
  const dt = document.getElementById('date-display-text');
  dt.textContent='選擇日期或區間'; dt.classList.add('placeholder');
  document.getElementById('f-img-preview').style.display='none';
  imgData=null; rangeStart=null; rangeEnd=null;
}
function previewImg(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX=800; let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=h*MAX/w;w=MAX;}}else{if(h>MAX){w=w*MAX/h;h=MAX;}}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      imgData=canvas.toDataURL('image/jpeg',0.75);
      document.getElementById('f-img-preview').src=imgData;
      document.getElementById('f-img-preview').style.display='block';
      document.getElementById('f-img-url').value='';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
async function savePlace() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('請填寫地點名稱'); return; }
  const type = document.getElementById('edit-type').value || currentType;
  const urlImg = document.getElementById('f-img-url').value.trim();
  const place = {
    name, location:document.getElementById('f-location').value.trim(),
    date:document.getElementById('f-date').value.trim(),
    tags:document.getElementById('f-tags').value.trim(),
    desc:document.getElementById('f-desc').value.trim(),
    kuula:document.getElementById('f-kuula').value.trim(),
    img:imgData||urlImg||'',
  };
  const arr = type==='camping'?campingData:motoData;
  if (editingIdx!==null) arr[editingIdx]=place; else arr.push(place);
  await saveToSheets(type); renderList(type); updateStats(); closeModal();
}
async function saveToSheets(type) {
  document.getElementById('saving-overlay').classList.add('show');
  try {
    const data = type==='camping'?campingData:motoData;
    await fetch(API, { method:'POST', body:JSON.stringify({sheet:type,data}) });
    showToast('已儲存！');
  } catch(e) { showToast('儲存失敗，請檢查網路',true); }
  finally { document.getElementById('saving-overlay').classList.remove('show'); }
}
function showToast(msg,isError) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(isError?' error':'')+' show';
  setTimeout(()=>t.classList.remove('show'),2500);
}
document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay'))closeModal();
});
document.getElementById('login-pw').addEventListener('keydown',e=>{ if(e.key==='Enter')doLogin(); });
</script>
